# Render Blueprint for TasteExplorer Backend
# Deploy with: https://dashboard.render.com/select-repo

services:
  # FastAPI Backend
  - type: web
    name: tasteexplorer-api
    runtime: python
    plan: free  # Change to 'starter' or higher for production
    region: oregon  # Change to your preferred region
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: tasteexplorer-db
          property: connectionString
      - key: SPOTIFY_CLIENT_ID
        sync: false  # Set manually in Render dashboard
      - key: SPOTIFY_CLIENT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: SPOTIFY_REDIRECT_URI
        sync: false  # Set to https://your-api.onrender.com/auth/spotify/callback
      - key: CORS_ORIGINS
        sync: false  # Set to your Vercel frontend URL
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        sync: false  # Optional: Add if using Redis

databases:
  # PostgreSQL Database
  - name: tasteexplorer-db
    plan: free  # Change to 'starter' or higher for production
    databaseName: tasteexplorer
    user: tasteexplorer
    region: oregon  # Match your API region
